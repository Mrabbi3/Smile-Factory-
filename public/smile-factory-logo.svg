<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Red Text: Smile Factory -->
  <text x="200" y="80" font-size="48" font-weight="bold" fill="#bb0100" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">
    Smile Factory
  </text>
  
  <!-- Gears -->
  <g>
    <!-- Main Large Gear Left (red with teeth) -->
    <circle cx="120" cy="200" r="60" fill="none" stroke="#bb0100" stroke-width="8"/>
    <circle cx="120" cy="200" r="50" fill="white" stroke="#bb0100" stroke-width="2"/>
    <!-- Teeth -->
    <g stroke="#bb0100" stroke-width="6" fill="none">
      <line x1="120" y1="140" x2="120" y2="125"/>
      <line x1="155" y1="155" x2="165" y2="145"/>
      <line x1="180" y1="200" x2="195" y2="200"/>
      <line x1="155" y1="245" x2="165" y2="255"/>
      <line x1="120" y1="260" x2="120" y2="275"/>
      <line x1="85" y1="245" x2="75" y2="255"/>
      <line x1="60" y1="200" x2="45" y2="200"/>
      <line x1="85" y1="155" x2="75" y2="145"/>
    </g>
    <circle cx="120" cy="200" r="15" fill="#bb0100"/>
    <circle cx="120" cy="200" r="8" fill="white"/>
    
    <!-- Main Large Gear Right (red with teeth) -->
    <circle cx="280" cy="200" r="60" fill="none" stroke="#bb0100" stroke-width="8"/>
    <circle cx="280" cy="200" r="50" fill="white" stroke="#bb0100" stroke-width="2"/>
    <!-- Teeth -->
    <g stroke="#bb0100" stroke-width="6" fill="none">
      <line x1="280" y1="140" x2="280" y2="125"/>
      <line x1="315" y1="155" x2="325" y2="145"/>
      <line x1="340" y1="200" x2="355" y2="200"/>
      <line x1="315" y1="245" x2="325" y2="255"/>
      <line x1="280" y1="260" x2="280" y2="275"/>
      <line x1="245" y1="245" x2="235" y2="255"/>
      <line x1="220" y1="200" x2="205" y2="200"/>
      <line x1="245" y1="155" x2="235" y2="145"/>
    </g>
    <circle cx="280" cy="200" r="15" fill="#bb0100"/>
    <circle cx="280" cy="200" r="8" fill="white"/>
    
    <!-- Small Gear Top Center (red with teeth) -->
    <circle cx="200" cy="110" r="40" fill="none" stroke="#bb0100" stroke-width="6"/>
    <circle cx="200" cy="110" r="32" fill="white" stroke="#bb0100" stroke-width="2"/>
    <!-- Teeth -->
    <g stroke="#bb0100" stroke-width="4" fill="none">
      <line x1="200" y1="70" x2="200" y2="60"/>
      <line x1="228" y1="82" x2="235" y2="75"/>
      <line x1="242" y1="110" x2="252" y2="110"/>
      <line x1="228" y1="138" x2="235" y2="145"/>
      <line x1="200" y1="150" x2="200" y2="160"/>
      <line x1="172" y1="138" x2="165" y2="145"/>
      <line x1="158" y1="110" x2="148" y2="110"/>
      <line x1="172" y1="82" x2="165" y2="75"/>
    </g>
    <circle cx="200" cy="110" r="10" fill="#bb0100"/>
    <circle cx="200" cy="110" r="5" fill="white"/>
    
    <!-- Small Gear Bottom Center (red with teeth) -->
    <circle cx="200" cy="290" r="40" fill="none" stroke="#bb0100" stroke-width="6"/>
    <circle cx="200" cy="290" r="32" fill="white" stroke="#bb0100" stroke-width="2"/>
    <!-- Teeth -->
    <g stroke="#bb0100" stroke-width="4" fill="none">
      <line x1="200" y1="250" x2="200" y2="240"/>
      <line x1="228" y1="262" x2="235" y2="255"/>
      <line x1="242" y1="290" x2="252" y2="290"/>
      <line x1="228" y1="318" x2="235" y2="325"/>
      <line x1="200" y1="330" x2="200" y2="340"/>
      <line x1="172" y1="318" x2="165" y2="325"/>
      <line x1="158" y1="290" x2="148" y2="290"/>
      <line x1="172" y1="262" x2="165" y2="255"/>
    </g>
    <circle cx="200" cy="290" r="10" fill="#bb0100"/>
    <circle cx="200" cy="290" r="5" fill="white"/>
  </g>
  
  <!-- Red Text: Arcade & Family Fun Center -->
  <text x="200" y="360" font-size="32" font-weight="bold" fill="#bb0100" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">
    Arcade & Family Fun Center
  </text>
</svg>